<nav class="paginator">
    <ul>
        <li class="paginator-browser older">
            {% if include.entry.previous %}
            <a href="{{ include.entry.previous.url }}" title="{{ include.entry.previous.title | escape }}"><i class="fa fa-chevron-left"></i> Older</a>
            {% endif %}
        </li><li class="paginator-browser home">
            <a href="/" class="fa fa-home"></a>
        </li><li class="paginator-browser newer">
            {% if include.entry.next %}
            <a href="{{ include.entry.next.url }}" title="{{ include.entry.next.title | escape }}">Newer <i class="fa fa-chevron-right"></i></a>
            {% endif %}
        </li>
    </ul>
</nav>
